name: nightly

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated roles to build (companion,repeater,room-server)'
        default: 'companion,repeater,room-server'
        type: string
      dry_run:
        description: 'Skip release creation, prune, and README update'
        default: false
        type: boolean
      branch_override:
        description: 'Upstream branch to build (overrides nightly.yml)'
        default: ''
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      upstream_repo: ${{ steps.cfg.outputs.upstream_repo }}
      upstream_branch: ${{ steps.cfg.outputs.upstream_branch }}
      upstream_sha: ${{ steps.cfg.outputs.upstream_sha }}
      upstream_sha7: ${{ steps.cfg.outputs.upstream_sha7 }}
      pr_list: ${{ steps.cfg.outputs.pr_list }}
      retention: ${{ steps.cfg.outputs.retention }}
      roles: ${{ steps.cfg.outputs.roles }}
      run_date: ${{ steps.cfg.outputs.run_date }}
      run_ts: ${{ steps.cfg.outputs.run_ts }}
    steps:
      - uses: actions/checkout@v5

      - name: Parse config
        id: cfg
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ROLES: ${{ inputs.roles }}
          INPUT_BRANCH: ${{ inputs.branch_override }}
        run: |
          set -euo pipefail
          REPO=$(yq -r '.upstream.repo // "meshcore-dev/MeshCore"' nightly.yml)
          BRANCH_CFG=$(yq -r '.upstream.branch // "dev"' nightly.yml)
          BRANCH="${INPUT_BRANCH:-}"
          [ -z "$BRANCH" ] && BRANCH="$BRANCH_CFG"
          PRS=$(yq -o=json -I=0 '.extra_prs // []' nightly.yml)
          RET=$(yq -r '.retention // 10' nightly.yml)
          ROLES_INPUT="${INPUT_ROLES:-companion,repeater,room-server}"
          ROLES_JSON=$(echo "$ROLES_INPUT" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          SHA=$(gh api "repos/${REPO}/commits/${BRANCH}" --jq '.sha')
          SHA7="${SHA:0:7}"
          DATE=$(date -u +%Y%m%d)
          TS=$(date -u +"%Y-%m-%d %H:%M")
          {
            echo "upstream_repo=$REPO"
            echo "upstream_branch=$BRANCH"
            echo "upstream_sha=$SHA"
            echo "upstream_sha7=$SHA7"
            echo "pr_list=$PRS"
            echo "retention=$RET"
            echo "roles=$ROLES_JSON"
            echo "run_date=$DATE"
            echo "run_ts=$TS"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: repo=$REPO branch=$BRANCH sha=$SHA roles=$ROLES_JSON prs=$PRS retention=$RET"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.prepare.outputs.roles) }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v5
        with:
          path: config

      - name: Checkout upstream
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.upstream_repo }}
          ref: ${{ needs.prepare.outputs.upstream_branch }}
          path: src
          fetch-depth: 0

      - name: Configure git in upstream checkout
        working-directory: src
        run: |
          git config user.email "actions@github.com"
          git config user.name "nightly-builder"

      - name: Apply extra PRs
        id: prs
        working-directory: src
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ needs.prepare.outputs.upstream_repo }}
          PR_LIST: ${{ needs.prepare.outputs.pr_list }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          mkdir -p ../pr-status
          STATUS="../pr-status/${ROLE}.json"
          echo '[]' > "$STATUS"
          echo "$PR_LIST" | jq -r '.[]' | while read -r n; do
            [ -z "$n" ] && continue
            TITLE=$(gh pr view "$n" --repo "$UPSTREAM" --json title --jq '.title' 2>/dev/null || true)
            if [ -z "$TITLE" ]; then
              jq --argjson n "$n" --arg s "fetch_fail" --arg t "" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n: fetch failed"
              continue
            fi
            if git fetch origin "pull/${n}/head:pr-${n}" >/dev/null 2>&1 \
               && git merge --no-edit "pr-${n}" >/dev/null 2>&1; then
              jq --argjson n "$n" --arg s "merged" --arg t "$TITLE" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n merged: $TITLE"
            else
              git merge --abort >/dev/null 2>&1 || true
              jq --argjson n "$n" --arg s "conflict" --arg t "$TITLE" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n conflict: $TITLE"
            fi
          done
          cat "$STATUS"

      # ~/.platformio (toolchains, platforms, download cache) is identical across all
      # three roles, so we share a single cache key. Total ~5 GiB.
      - name: Cache PlatformIO packages and platforms
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: pio-pkg-${{ hashFiles('src/platformio.ini', 'src/variants/**/platformio.ini', 'src/library.json') }}
          restore-keys: |
            pio-pkg-

      # src/.pio/libdeps holds per-env library copies (PIO duplicates the same lib
      # source per env subdir). Per-role key keeps each role's full libdeps set.
      - name: Cache project libdeps for role
        uses: actions/cache@v4
        with:
          path: src/.pio/libdeps
          key: pio-libs-${{ matrix.role }}-${{ hashFiles('src/platformio.ini', 'src/variants/**/platformio.ini', 'src/library.json') }}
          restore-keys: |
            pio-libs-${{ matrix.role }}-

      - name: Setup build environment
        uses: ./src/.github/actions/setup-build-environment

      - name: Build firmwares
        working-directory: src
        env:
          FIRMWARE_VERSION: nightly-${{ needs.prepare.outputs.run_date }}-${{ needs.prepare.outputs.upstream_sha7 }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          case "$ROLE" in
            companion)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_companion_radio_(usb|ble)$" | sort)
              ;;
            repeater)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_repeater$" | sort)
              ;;
            room-server)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_room_server$" | sort)
              ;;
            *)
              echo "Unknown role: $ROLE" >&2; exit 1 ;;
          esac
          TOTAL=${#ENVS[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "No envs matched for role=$ROLE" >&2; exit 1
          fi
          # build.sh wipes ./out at every invocation, so collect outputs in a sibling dir
          # and restore them to ./out at the end for the upload + release steps.
          COLLECT_DIR="$(pwd)/../collected"
          rm -rf "$COLLECT_DIR"
          mkdir -p "$COLLECT_DIR"
          echo "Will build $TOTAL envs for role=$ROLE"
          for i in "${!ENVS[@]}"; do
            IDX=$((i+1))
            ENV="${ENVS[$i]}"
            echo "::group::[$IDX/$TOTAL] $ENV"
            bash build.sh build-firmware "$ENV"
            if [ -d out ]; then
              shopt -s nullglob dotglob
              files=(out/*)
              shopt -u dotglob
              if [ ${#files[@]} -gt 0 ]; then
                cp -- "${files[@]}" "$COLLECT_DIR/"
              fi
            fi
            echo "::endgroup::"
          done
          rm -rf out
          mkdir -p out
          shopt -s nullglob dotglob
          collected=("$COLLECT_DIR"/*)
          shopt -u dotglob
          if [ ${#collected[@]} -gt 0 ]; then
            mv -- "${collected[@]}" out/
          fi
          echo "Built $TOTAL firmwares; out/ contains $(ls out | wc -l) files"

      - name: Build release body
        id: body
        if: ${{ inputs.dry_run != true }}
        env:
          UPSTREAM: ${{ needs.prepare.outputs.upstream_repo }}
          BRANCH: ${{ needs.prepare.outputs.upstream_branch }}
          SHA: ${{ needs.prepare.outputs.upstream_sha }}
          TS: ${{ needs.prepare.outputs.run_ts }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          STATUS="pr-status/${ROLE}.json"
          {
            echo "Upstream: ${UPSTREAM}@${SHA} (${BRANCH})"
            echo "Built: ${TS} UTC"
            echo
            MERGED=$(jq -r '[.[] | select(.status=="merged")] | length' "$STATUS")
            if [ "$MERGED" -gt 0 ]; then
              echo "Merged PRs:"
              jq -r '.[] | select(.status=="merged") | "- #\(.number) \(.title)"' "$STATUS"
              echo
            fi
            SKIPPED=$(jq -r '[.[] | select(.status!="merged")] | length' "$STATUS")
            if [ "$SKIPPED" -gt 0 ]; then
              echo "Skipped PRs:"
              jq -r '.[] | select(.status!="merged") | "- #\(.number) \(.title) — \(.status | sub("_"; " "))"' "$STATUS"
              echo
            fi
            echo "Firmware artifacts attached below."
          } > release-body.md
          cat release-body.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmwares-${{ matrix.role }}
          path: src/out/*
          if-no-files-found: error

      - name: Upload PR status
        uses: actions/upload-artifact@v4
        with:
          name: pr-status-${{ matrix.role }}
          path: pr-status/${{ matrix.role }}.json
          if-no-files-found: error

      - name: Create release
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ROLE: ${{ matrix.role }}
          DATE: ${{ needs.prepare.outputs.run_date }}
          SHA7: ${{ needs.prepare.outputs.upstream_sha7 }}
        run: |
          set -euo pipefail
          TAG="nightly-${ROLE}-${DATE}"
          NAME="Nightly ${ROLE} ${DATE} (${SHA7})"

          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            echo "Existing release for $TAG found; deleting before recreate."
            gh release delete "$TAG" -R "$REPO" --cleanup-tag --yes
          fi

          shopt -s nullglob
          ARTIFACTS=(src/out/*)
          if [ ${#ARTIFACTS[@]} -eq 0 ]; then
            echo "No firmware artifacts produced under src/out/" >&2
            exit 1
          fi

          gh release create "$TAG" "${ARTIFACTS[@]}" \
            -R "$REPO" \
            --title "$NAME" \
            --notes-file release-body.md \
            --target main \
            --prerelease

  prune:
    needs: [prepare, build]
    if: ${{ always() && inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Prune old nightly releases per role
        env:
          GH_TOKEN: ${{ github.token }}
          RET: ${{ needs.prepare.outputs.retention }}
        run: |
          set -euo pipefail
          for role in companion repeater room-server; do
            echo "Pruning role=$role keep=$RET"
            gh release list -R "$GITHUB_REPOSITORY" -L 200 --json tagName,createdAt,isPrerelease \
              | jq -r --arg p "nightly-${role}-" --argjson keep "$RET" '
                  [.[] | select(.tagName | startswith($p))]
                  | sort_by(.createdAt) | reverse
                  | .[$keep:]
                  | .[].tagName
                ' \
              | while read -r tag; do
                  [ -z "$tag" ] && continue
                  echo "Deleting $tag"
                  gh release delete "$tag" -R "$GITHUB_REPOSITORY" --cleanup-tag --yes || \
                    echo "Failed to delete $tag (continuing)"
                done
          done

  update-readme:
    needs: [prepare, build, prune]
    if: ${{ always() && inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download PR status artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pr-status-*
          merge-multiple: false

      - name: Build auto-section
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ needs.prepare.outputs.upstream_repo }}
          BRANCH: ${{ needs.prepare.outputs.upstream_branch }}
          SHA: ${{ needs.prepare.outputs.upstream_sha }}
          SHA7: ${{ needs.prepare.outputs.upstream_sha7 }}
          DATE: ${{ needs.prepare.outputs.run_date }}
          TS: ${{ needs.prepare.outputs.run_ts }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          status_for() {
            local role="$1"
            local tag="nightly-${role}-${DATE}"
            if gh release view "$tag" -R "$REPO" >/dev/null 2>&1; then
              echo "[ok](https://github.com/${REPO}/releases/tag/${tag})"
            else
              echo "failed"
            fi
          }

          {
            echo "<!-- BEGIN AUTO -->"
            echo
            echo "## Latest build"
            echo
            echo "- **Date (UTC):** ${TS}"
            echo "- **Upstream:** [\`${SHA7}\`](https://github.com/${UPSTREAM}/commit/${SHA}) on [\`${BRANCH}\`](https://github.com/${UPSTREAM}/tree/${BRANCH})"
            echo "- **Companion:** $(status_for companion)"
            echo "- **Repeater:** $(status_for repeater)"
            echo "- **Room server:** $(status_for room-server)"
            echo

            echo "## Recent builds"
            echo
            echo "| Date | Companion | Repeater | Room server |"
            echo "|------|-----------|----------|-------------|"
            ALL_TAGS=$(gh release list -R "$REPO" -L 200 --json tagName --jq '.[].tagName')
            DATES=$(echo "$ALL_TAGS" \
              | grep -E '^nightly-(companion|repeater|room-server)-[0-9]{8}$' \
              | sed -E 's/^nightly-(companion|repeater|room-server)-([0-9]{8})$/\2/' \
              | sort -u | sort -r | head -7)
            for d in $DATES; do
              row="| ${d:0:4}-${d:4:2}-${d:6:2} |"
              for role in companion repeater room-server; do
                tag="nightly-${role}-${d}"
                if echo "$ALL_TAGS" | grep -qx "$tag"; then
                  row="$row [ok](https://github.com/${REPO}/releases/tag/${tag}) |"
                else
                  row="$row failed |"
                fi
              done
              echo "$row"
            done
            echo

            STATUS_FILE=""
            for f in artifacts/pr-status-*/*.json; do
              [ -f "$f" ] && STATUS_FILE="$f" && break
            done
            if [ -n "$STATUS_FILE" ] && [ "$(jq 'length' "$STATUS_FILE")" -gt 0 ]; then
              echo "## Configured PRs"
              echo
              jq -r --arg up "$UPSTREAM" '
                .[] |
                "- [#\(.number)](https://github.com/\($up)/pull/\(.number)) \(.title) — " +
                  (if .status == "merged" then "merged"
                   elif .status == "conflict" then "conflict"
                   else "fetch fail" end)
              ' "$STATUS_FILE"
              echo
            fi

            echo "<!-- END AUTO -->"
          } > auto.md

          awk '
            /<!-- BEGIN AUTO -->/ {
              while ((getline line < "auto.md") > 0) print line
              close("auto.md")
              inblock = 1
              next
            }
            /<!-- END AUTO -->/ && inblock {
              inblock = 0
              next
            }
            !inblock { print }
          ' README.md > README.new
          mv README.new README.md
          rm -f auto.md

      - name: Commit README if changed
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git diff --quiet README.md; then
            echo "README unchanged"
            exit 0
          fi
          git add README.md
          git commit -m "Update nightly status [skip ci]"
          git push
