name: nightly

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      roles:
        description: 'Comma-separated roles to build (companion,repeater,room-server)'
        default: 'companion,repeater,room-server'
        type: string
      dry_run:
        description: 'Skip release creation, prune, and README update'
        default: false
        type: boolean
      branch_override:
        description: 'Upstream branch to build (overrides nightly.yml)'
        default: ''
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      upstream_repo: ${{ steps.cfg.outputs.upstream_repo }}
      upstream_branch: ${{ steps.cfg.outputs.upstream_branch }}
      upstream_sha: ${{ steps.cfg.outputs.upstream_sha }}
      upstream_sha7: ${{ steps.cfg.outputs.upstream_sha7 }}
      pr_list: ${{ steps.cfg.outputs.pr_list }}
      retention: ${{ steps.cfg.outputs.retention }}
      roles: ${{ steps.cfg.outputs.roles }}
      run_date: ${{ steps.cfg.outputs.run_date }}
      run_ts: ${{ steps.cfg.outputs.run_ts }}
    steps:
      - uses: actions/checkout@v5

      - name: Parse config
        id: cfg
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ROLES: ${{ inputs.roles }}
          INPUT_BRANCH: ${{ inputs.branch_override }}
        run: |
          set -euo pipefail
          REPO=$(yq -r '.upstream.repo // "meshcore-dev/MeshCore"' nightly.yml)
          BRANCH_CFG=$(yq -r '.upstream.branch // "dev"' nightly.yml)
          BRANCH="${INPUT_BRANCH:-}"
          [ -z "$BRANCH" ] && BRANCH="$BRANCH_CFG"
          PRS=$(yq -o=json -I=0 '.extra_prs // []' nightly.yml)
          RET=$(yq -r '.retention // 10' nightly.yml)
          ROLES_INPUT="${INPUT_ROLES:-companion,repeater,room-server}"
          ROLES_JSON=$(echo "$ROLES_INPUT" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          SHA=$(gh api "repos/${REPO}/commits/${BRANCH}" --jq '.sha')
          SHA7="${SHA:0:7}"
          DATE=$(date -u +%Y%m%d)
          TS=$(date -u +"%Y-%m-%d %H:%M")
          {
            echo "upstream_repo=$REPO"
            echo "upstream_branch=$BRANCH"
            echo "upstream_sha=$SHA"
            echo "upstream_sha7=$SHA7"
            echo "pr_list=$PRS"
            echo "retention=$RET"
            echo "roles=$ROLES_JSON"
            echo "run_date=$DATE"
            echo "run_ts=$TS"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: repo=$REPO branch=$BRANCH sha=$SHA roles=$ROLES_JSON prs=$PRS retention=$RET"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.prepare.outputs.roles) }}
    steps:
      - name: Checkout config
        uses: actions/checkout@v5
        with:
          path: config

      - name: Checkout upstream
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.upstream_repo }}
          ref: ${{ needs.prepare.outputs.upstream_branch }}
          path: src
          fetch-depth: 0

      - name: Configure git in upstream checkout
        working-directory: src
        run: |
          git config user.email "actions@github.com"
          git config user.name "nightly-builder"

      - name: Apply extra PRs
        id: prs
        working-directory: src
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ needs.prepare.outputs.upstream_repo }}
          PR_LIST: ${{ needs.prepare.outputs.pr_list }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          mkdir -p ../pr-status
          STATUS="../pr-status/${ROLE}.json"
          echo '[]' > "$STATUS"
          echo "$PR_LIST" | jq -r '.[]' | while read -r n; do
            [ -z "$n" ] && continue
            TITLE=$(gh pr view "$n" --repo "$UPSTREAM" --json title --jq '.title' 2>/dev/null || true)
            if [ -z "$TITLE" ]; then
              jq --argjson n "$n" --arg s "fetch_fail" --arg t "" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n: fetch failed"
              continue
            fi
            if git fetch origin "pull/${n}/head:pr-${n}" >/dev/null 2>&1 \
               && git merge --no-edit "pr-${n}" >/dev/null 2>&1; then
              jq --argjson n "$n" --arg s "merged" --arg t "$TITLE" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n merged: $TITLE"
            else
              git merge --abort >/dev/null 2>&1 || true
              jq --argjson n "$n" --arg s "conflict" --arg t "$TITLE" \
                 '. += [{"number":$n,"title":$t,"status":$s}]' "$STATUS" > "$STATUS.tmp"
              mv "$STATUS.tmp" "$STATUS"
              echo "PR #$n conflict: $TITLE"
            fi
          done
          cat "$STATUS"

      - name: Cache PlatformIO toolchains and project deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            src/.pio
          key: pio-${{ matrix.role }}-${{ hashFiles('src/platformio.ini', 'src/variants/**/platformio.ini', 'src/library.json') }}
          restore-keys: |
            pio-${{ matrix.role }}-

      - name: Setup build environment
        uses: ./src/.github/actions/setup-build-environment

      - name: Build firmwares
        working-directory: src
        env:
          FIRMWARE_VERSION: nightly-${{ needs.prepare.outputs.run_date }}-${{ needs.prepare.outputs.upstream_sha7 }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          case "$ROLE" in
            companion)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_companion_radio_(usb|ble)$" | sort)
              ;;
            repeater)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_repeater$" | sort)
              ;;
            room-server)
              mapfile -t ENVS < <(bash build.sh list | grep -E "_room_server$" | sort)
              ;;
            *)
              echo "Unknown role: $ROLE" >&2; exit 1 ;;
          esac
          mkdir -p out
          TOTAL=${#ENVS[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "No envs matched for role=$ROLE" >&2; exit 1
          fi
          echo "Will build $TOTAL envs for role=$ROLE"
          for i in "${!ENVS[@]}"; do
            IDX=$((i+1))
            ENV="${ENVS[$i]}"
            echo "::group::[$IDX/$TOTAL] $ENV"
            bash build.sh build-firmware "$ENV"
            echo "::endgroup::"
          done
          echo "Built $TOTAL firmwares; out/ contains $(ls out | wc -l) files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmwares-${{ matrix.role }}
          path: src/out/*
          if-no-files-found: error

      - name: Upload PR status
        uses: actions/upload-artifact@v4
        with:
          name: pr-status-${{ matrix.role }}
          path: pr-status/${{ matrix.role }}.json
          if-no-files-found: error
